services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      BACKEND_HOST: 0.0.0.0
      MYSQL_HOST: ${DOCKER_MYSQL_HOST:-ai_tag_fix_mysql}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-ai_tag_fix_redis}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - ai_tag_fix_default

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - ai_tag_fix_default

networks:
  ai_tag_fix_default:
    external: true
    name: ai_tag_fix_default

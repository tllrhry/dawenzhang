services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: sqlite:////data/dawenzhang.db
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
    volumes:
      - ${APP_DATA_DIR:-./data}:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - backend
